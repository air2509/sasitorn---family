<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sasitorn Family</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222636; --border: #2e3350;
    --accent: #f6c549; --accent3: #6ec6a0; --text: #e8eaf6; --text2: #8b90b8;
    --red: #e05c5c; --fam1: #f6c549; --fam2: #6ec6a0; --fam3: #e8855a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }
  header { background: #1a1d27; border-bottom: 1px solid var(--border); padding: 14px 16px 11px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.1rem; color: var(--accent); font-weight: 700; }
  header p { font-size: 0.72rem; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { padding: 10px 16px; font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .container { padding: 14px; max-width: 640px; margin: 0 auto; }
  .section { display: none; } .section.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 12px; }
  .card-title { font-size: 0.87rem; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  label { display: block; font-size: 0.76rem; color: var(--text2); margin-bottom: 4px; margin-top: 10px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], input[type=date], input[type=number] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 0.85rem; padding: 8px 10px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); }
  .who-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 6px; }
  .who-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text2); font-size: 0.76rem; padding: 6px 2px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .who-btn .tag { font-size: 0.6rem; opacity: 0.6; display: block; margin-top: 1px; }
  .who-btn.fam1.selected { background: rgba(246,197,73,0.15); border-color: var(--fam1); color: var(--fam1); }
  .who-btn.fam2.selected { background: rgba(110,198,160,0.15); border-color: var(--fam2); color: var(--fam2); }
  .who-btn.fam3.selected { background: rgba(232,133,90,0.15); border-color: var(--fam3); color: var(--fam3); }
  .payer-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 6px; }
  .payer-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text2); font-size: 0.82rem; font-weight: 600; padding: 8px 5px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .payer-btn.active-fam1 { background: rgba(246,197,73,0.2); border-color: var(--fam1); color: var(--fam1); }
  .payer-btn.active-fam2 { background: rgba(110,198,160,0.2); border-color: var(--fam2); color: var(--fam2); }
  .payer-btn.active-fam3 { background: rgba(232,133,90,0.2); border-color: var(--fam3); color: var(--fam3); }
  .btn-primary { width: 100%; background: var(--accent); color: #111; border: none; border-radius: 9px; font-size: 0.9rem; font-weight: 700; padding: 11px; cursor: pointer; margin-top: 15px; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-undo { display: none; width: 100%; margin-top: 8px; padding: 10px; border-radius: 9px; border: 1px solid var(--accent); background: rgba(246,197,73,0.1); color: var(--accent); font-size: 0.88rem; font-weight: 700; cursor: pointer; }
  .family-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .family-card-header { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border); }
  .family-name { font-size: 0.88rem; font-weight: 700; }
  .c1 { color: var(--fam1); } .c2 { color: var(--fam2); } .c3 { color: var(--fam3); }
  .family-total { font-size: 1rem; font-weight: 700; color: var(--red); }
  .debt-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
  .debt-row:last-child { border-bottom: none; }
  .debt-from { color: var(--text2); }
  .debt-from span { color: var(--text); font-weight: 600; }
  .debt-amount { color: var(--red); font-weight: 600; }
  .pay-btn { background: rgba(110,198,160,0.15); border: 1px solid var(--accent3); color: var(--accent3); border-radius: 5px; font-size: 0.7rem; padding: 3px 8px; cursor: pointer; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; margin-bottom: 8px; }
  .history-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .history-date { font-size: 0.7rem; color: var(--text2); }
  .history-shop { font-size: 0.88rem; font-weight: 700; }
  .history-total { font-size: 0.92rem; font-weight: 700; color: var(--accent); }
  .history-detail { font-size: 0.75rem; color: var(--text2); display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 18px; padding: 2px 8px; font-size: 0.7rem; }
  .chip.payer { border-color: var(--accent); color: var(--accent); }
  .del-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 0.9rem; padding: 2px 4px; }
  .del-btn:hover { color: var(--red); }
  .paid-item { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 10px 13px; margin-bottom: 7px; opacity: 0.65; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
  .paid-badge { background: rgba(110,198,160,0.15); border: 1px solid var(--accent3); color: var(--accent3); border-radius: 18px; font-size: 0.66rem; padding: 2px 8px; }
  .empty { text-align: center; color: var(--text2); padding: 32px 16px; font-size: 0.85rem; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent3); color: #111; padding: 8px 16px; border-radius: 18px; font-size: 0.8rem; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .input-row { display: flex; gap: 8px; }
  .input-row > div { flex: 1; }
  .section-label { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); display: inline-block; flex-shrink: 0; }
  .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .overlay.hidden { display: none; }
  .overlay-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 20px; max-width: 300px; width: 90%; text-align: center; }
  .overlay-box h3 { color: var(--accent); margin-bottom: 10px; font-size: 1rem; }
  .overlay-box p { font-size: 0.82rem; color: var(--text2); line-height: 1.6; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="overlay" id="loading-overlay">
  <div class="overlay-box">
    <div class="spinner"></div>
    <h3>กำลังโหลดข้อมูล</h3>
    <p>กำลังดึงข้อมูลที่แชร์ร่วมกัน...</p>
  </div>
</div>

<header>
  <h1>🍽️ Sasitorn Family</h1>
  <p>
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-status">กำลังเชื่อมต่อ...</span>
    &nbsp;
    <button onclick="resetAll()" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:5px;font-size:0.68rem;padding:2px 8px;cursor:pointer;">🗑 รีเซ็ต</button>
  </p>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('add')">➕ บันทึก</button>
  <button class="tab" onclick="showTab('summary')">💰 ยอดค้าง</button>
  <button class="tab" onclick="showTab('history')">📋 ประวัติ</button>
  <button class="tab" onclick="showTab('paid')">✅ จ่ายแล้ว</button>
</div>

<div class="container section active" id="tab-add">
  <div class="card">
    <div class="card-title">📅 ข้อมูลมื้ออาหาร</div>
    <div class="input-row">
      <div><label>วันที่</label><input type="date" id="inp-date"></div>
      <div><label>ยอดรวม (บาท)</label><input type="number" id="inp-amount" placeholder="0" step="1" min="0"></div>
    </div>
    <label>ร้านอาหาร</label>
    <input type="text" id="inp-shop" placeholder="ชื่อร้าน...">
  </div>
  <div class="card">
    <div class="card-title">👑 ใครเป็นคนจ่าย</div>
    <p class="section-label">เลือกหัวหน้าครอบครัวที่จ่ายเงินไปก่อน</p>
    <div class="payer-grid">
      <button class="payer-btn" id="payer-แอร์" onclick="selectPayer('แอร์')">แอร์<br><small style="font-size:0.66rem;opacity:0.7">ครอบครัว 1</small></button>
      <button class="payer-btn" id="payer-โบ๊ท" onclick="selectPayer('โบ๊ท')">โบ๊ท<br><small style="font-size:0.66rem;opacity:0.7">ครอบครัว 2</small></button>
      <button class="payer-btn" id="payer-ฟ้า" onclick="selectPayer('ฟ้า')">ฟ้า<br><small style="font-size:0.66rem;opacity:0.7">ครอบครัว 3</small></button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">👨‍👩‍👧‍👦 ใครไปบ้าง</div>
    <p class="section-label">เลือกทุกคนที่ร่วมทานในมื้อนี้</p>
    <div class="who-grid">
      <button class="who-btn" style="grid-column:1/-1;background:rgba(246,197,73,0.1);border-color:var(--accent);color:var(--accent);font-weight:700;padding:8px;" onclick="selectAll()">⭐ ไปทุกคน</button>
      <button class="who-btn fam1" onclick="toggleWho('แอร์')" id="who-แอร์">แอร์<span class="tag">ครอบ 1</span></button>
      <button class="who-btn fam1" onclick="toggleWho('ฝน')" id="who-ฝน">ฝน<span class="tag">ครอบ 1</span></button>
      <button class="who-btn fam2" onclick="toggleWho('โบ๊ท')" id="who-โบ๊ท">โบ๊ท<span class="tag">ครอบ 2</span></button>
      <button class="who-btn fam2" onclick="toggleWho('น้อง')" id="who-น้อง">น้อง<span class="tag">ครอบ 2</span></button>
      <button class="who-btn fam2" onclick="toggleWho('บลิ้งค์')" id="who-บลิ้งค์">บลิ้งค์<span class="tag">ครอบ 2</span></button>
      <button class="who-btn fam3" onclick="toggleWho('ฟ้า')" id="who-ฟ้า">ฟ้า<span class="tag">ครอบ 3</span></button>
      <button class="who-btn fam3" onclick="toggleWho('พี')" id="who-พี">พี<span class="tag">ครอบ 3</span></button>
      <button class="who-btn fam3" onclick="toggleWho('บูม')" id="who-บูม">บูม<span class="tag">ครอบ 3</span></button>
    </div>
  </div>
  <button class="btn-primary" id="save-btn" onclick="addRecord()">💾 บันทึกมื้ออาหาร</button>
  <button class="btn-undo" id="undo-btn" onclick="undoLast()">↩️ Undo — ยกเลิกรายการล่าสุด</button>
</div>

<div class="container section" id="tab-summary"><div id="summary-content"></div></div>
<div class="container section" id="tab-history"><div id="history-content"></div></div>
<div class="container section" id="tab-paid"><div id="paid-content"></div></div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwqtRBgqU_2V0RcaHDjUxvhfZSD6usOXEIZXrTuxDN8Nlm_CFpzOzalUu1hzFaPNLI/exec';

const MEMBERS = {
  'แอร์':{family:1},'ฝน':{family:1},
  'โบ๊ท':{family:2},'น้อง':{family:2},'บลิ้งค์':{family:2},
  'ฟ้า':{family:3},'พี':{family:3},'บูม':{family:3}
};
const HEADS = {1:'แอร์',2:'โบ๊ท',3:'ฟ้า'};
const FAM_CLASS = {1:'c1',2:'c2',3:'c3'};

let selectedPayer = null;
let selectedWho = new Set();
let records = [];
let paidRecords = [];
let lastRecord = null;      // { type: 'add'|'paid', record, prevRecords, prevPaid, payer, who }

document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];

function fmtAmt(n) {
  const r = Math.round(n * 100) / 100;
  return r % 1 === 0 ? r.toLocaleString('th-TH') : r.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDebt(n) { return Math.ceil(n).toLocaleString('th-TH'); }

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-status');
  if (state === 'syncing') { dot.className = 'sync-dot syncing'; txt.textContent = 'กำลังซิงค์...'; }
  else if (state === 'ok') { dot.className = 'sync-dot'; txt.textContent = 'ซิงค์แล้ว · แชร์ร่วมกัน'; }
  else { dot.className = 'sync-dot error'; txt.textContent = 'เชื่อมต่อไม่ได้'; }
}

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now();
    const script = document.createElement('script');
    window[cb] = (data) => { delete window[cb]; document.body.removeChild(script); resolve(data); };
    script.onerror = () => { delete window[cb]; document.body.removeChild(script); reject(new Error('jsonp failed')); };
    script.src = url + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

async function apiGet(action) {
  return jsonp(API + '?action=' + action);
}

async function apiPost(action, body) {
  // Google Apps Script ไม่รองรับ CORS POST จาก file:// ต้องใช้ GET แทน
  const params = encodeURIComponent(JSON.stringify(body));
  return jsonp(API + '?action=' + action + '&data=' + params);
}

async function loadData() {
  setSyncStatus('syncing');
  try {
    const data = await apiGet('getAll');
    records = data.records || [];
    paidRecords = data.paid || [];
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    showToast('โหลดข้อมูลไม่สำเร็จ', true);
  }
  document.getElementById('loading-overlay').classList.add('hidden');
}



function selectPayer(name) {
  selectedPayer = name;
  document.querySelectorAll('.payer-btn').forEach(b => b.className = 'payer-btn');
  document.getElementById('payer-'+name).className = `payer-btn active-fam${MEMBERS[name].family}`;
}

function toggleWho(name) {
  if (selectedWho.has(name)) { selectedWho.delete(name); document.getElementById('who-'+name).classList.remove('selected'); }
  else { selectedWho.add(name); document.getElementById('who-'+name).classList.add('selected'); }
}

function selectAll() {
  Object.keys(MEMBERS).forEach(name => { selectedWho.add(name); document.getElementById('who-'+name).classList.add('selected'); });
}

async function addRecord() {
  const date = document.getElementById('inp-date').value;
  const shop = document.getElementById('inp-shop').value.trim();
  const amount = parseFloat(document.getElementById('inp-amount').value);
  if (!date) return showToast('กรุณาเลือกวันที่', true);
  if (!shop) return showToast('กรุณาระบุชื่อร้าน', true);
  if (!amount || amount <= 0) return showToast('กรุณาระบุจำนวนเงิน', true);
  if (!selectedPayer) return showToast('กรุณาเลือกผู้จ่าย', true);
  if (selectedWho.size === 0) return showToast('กรุณาเลือกผู้ร่วมทาน', true);
  if (!selectedWho.has(selectedPayer)) { selectedWho.add(selectedPayer); document.getElementById('who-'+selectedPayer).classList.add('selected'); }

  const whoArr = Array.from(selectedWho);
  const perHead = amount / whoArr.length;
  const payerFamily = MEMBERS[selectedPayer].family;
  const debts = {};
  whoArr.forEach(p => { const f = MEMBERS[p].family; if (f !== payerFamily) debts[f] = (debts[f]||0) + perHead; });
  const record = { id: Date.now(), date, shop, amount, payer: selectedPayer, payerFamily, who: whoArr, perHead, debts };

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  setSyncStatus('syncing');
  try {
    await loadData();
    const snapR = JSON.parse(JSON.stringify(records));
    const snapP = JSON.parse(JSON.stringify(paidRecords));
    records.push(record);
    await apiPost('saveRecord', record);
    lastRecord = { type:'add', record, prevRecords: snapR, prevPaid: snapP };
    document.getElementById('undo-btn').style.display = 'block';
    resetForm(false);
    showToast('บันทึกสำเร็จ! 🎉');
    setSyncStatus('ok');
    showTab('summary');
  } catch(e) {
    showToast('บันทึกไม่สำเร็จ กรุณาลองใหม่', true);
    setSyncStatus('error');
  }
  btn.disabled = false; btn.textContent = '💾 บันทึกมื้ออาหาร';
}

async function undoLast() {
  if (!lastRecord) return showToast('ไม่มีรายการให้ Undo', true);
  const label = lastRecord.type === 'add' ? `"${lastRecord.record.shop}"` : `การจ่าย ${lastRecord.paid.from} → ${lastRecord.paid.to}`;
  if (!confirm(`ยกเลิก ${label} ใช่ไหม?`)) return;
  setSyncStatus('syncing');
  try {
    records = lastRecord.prevRecords;
    paidRecords = lastRecord.prevPaid;
    await apiPost('reset', {});
    for (const r of records) await apiPost('saveRecord', r);
    for (const p of paidRecords) await apiPost('savePaid', p);
    if (lastRecord.type === 'add') {
      const ref = lastRecord.record;
      document.getElementById('inp-date').value = ref.date;
      document.getElementById('inp-shop').value = ref.shop;
      document.getElementById('inp-amount').value = ref.amount;
      selectPayer(ref.payer);
      ref.who.forEach(name => { selectedWho.add(name); document.getElementById('who-'+name).classList.add('selected'); });
      showTab('add');
      showToast(`ยกเลิก "${ref.shop}" แล้ว แก้ไขได้เลย`);
    } else {
      showTab('summary');
      showToast(`ยกเลิกการจ่าย ${lastRecord.paid.from} → ${lastRecord.paid.to} แล้ว`);
    }
    lastRecord = null;
    document.getElementById('undo-btn').style.display = 'none';
    setSyncStatus('ok');
    renderSummary(); renderHistory(); renderPaid();
  } catch(e) {
    showToast('Undo ไม่สำเร็จ', true);
    setSyncStatus('error');
  }
}

function resetForm(clearUndo = true) {
  document.getElementById('inp-shop').value = '';
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  selectedPayer = null; selectedWho = new Set();
  document.querySelectorAll('.payer-btn').forEach(b => b.className = 'payer-btn');
  document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('selected'));
  if (clearUndo) { lastRecord = null; document.getElementById('undo-btn').style.display = 'none'; }
}

function calcDebts() {
  const debt = {};
  [1,2,3].forEach(f => { debt[f] = {}; [1,2,3].forEach(t => { debt[f][t] = 0; }); });
  records.forEach(r => { Object.entries(r.debts||{}).forEach(([fam,amt]) => { debt[parseInt(fam)][r.payerFamily] += amt; }); });
  return debt;
}

function renderSummary() {
  const debt = calcDebts();
  let html = '';
  [1,2,3].forEach(rec => {
    let total = 0, rows = '';
    [1,2,3].forEach(deb => {
      const amt = debt[deb][rec];
      if (deb !== rec && amt > 0) {
        total += amt;
        rows += `<div class="debt-row">
          <div class="debt-from"><span>${HEADS[deb]}</span> ต้องจ่ายให้ <span>${HEADS[rec]}</span></div>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="debt-amount">฿${fmtDebt(amt)}</span>
            <button class="pay-btn" onclick="markPaid(${deb},${rec},${amt})">จ่ายแล้ว</button>
          </div>
        </div>`;
      }
    });
    if (rows) html += `<div class="family-card">
      <div class="family-card-header">
        <div class="family-name ${FAM_CLASS[rec]}">🏅 ${HEADS[rec]} จ่ายไปก่อน</div>
        <div class="family-total">฿${fmtDebt(total)}</div>
      </div>${rows}</div>`;
  });
  document.getElementById('summary-content').innerHTML = html || `<div class="empty">✅ ไม่มียอดค้างชำระ<br><small>ทุกอย่างเรียบร้อยแล้ว!</small></div>`;
}

async function markPaid(fromFam, toFam, amount) {
  if (!confirm(`บันทึกว่า ${HEADS[fromFam]} จ่ายให้ ${HEADS[toFam]} ฿${fmtDebt(amount)} แล้ว?`)) return;
  const paid = { id: Date.now(), date: new Date().toISOString().split('T')[0], from: HEADS[fromFam], to: HEADS[toFam], amount, fromFam, toFam };
  const adj = { id: Date.now()+1, date: paid.date, shop:'[ชำระหนี้]', amount:0, payer:HEADS[toFam], payerFamily:toFam, who:[], perHead:0, debts:{[fromFam]:-amount}, isPayment:true };
  setSyncStatus('syncing');
  try {
    await loadData();
    const snapR2 = JSON.parse(JSON.stringify(records));
    const snapP2 = JSON.parse(JSON.stringify(paidRecords));
    paidRecords.push(paid);
    records.push(adj);
    await apiPost('savePaid', paid);
    await apiPost('saveRecord', adj);
    lastRecord = { type:'paid', paid, adj, prevRecords: snapR2, prevPaid: snapP2 };
    document.getElementById('undo-btn').style.display = 'block';
    showToast(`✅ ${HEADS[fromFam]} จ่ายให้ ${HEADS[toFam]} แล้ว — กด Undo เพื่อยกเลิก`);
    setSyncStatus('ok');
    renderSummary(); renderPaid();
  } catch(e) {
    showToast('บันทึกไม่สำเร็จ', true);
    setSyncStatus('error');
  }
}

function renderHistory() {
  const real = records.filter(r => !r.isPayment);
  if (!real.length) { document.getElementById('history-content').innerHTML = '<div class="empty">ยังไม่มีรายการ<br><small>เริ่มบันทึกมื้ออาหารแรกได้เลย!</small></div>'; return; }
  const sorted = [...real].sort((a,b) => new Date(b.date)-new Date(a.date));
  let html = '';
  sorted.forEach(r => {
    const ds = new Date(r.date+'T00:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
    const chips = r.who.map(w=>`<span class="chip">${w}</span>`).join('');
    html += `<div class="history-item">
      <div class="history-top">
        <div><div class="history-date">${ds}</div><div class="history-shop">${r.shop}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="history-total">฿${fmtAmt(parseFloat(r.amount))}</div>
          <button class="del-btn" onclick="deleteRecord(${r.id})">🗑</button>
        </div>
      </div>
      <div class="history-detail">
        <span class="chip payer">👑 ${r.payer} จ่าย</span>
        <span style="color:var(--text2);font-size:0.7rem;padding-top:3px">฿${fmtAmt(parseFloat(r.perHead))}/คน</span>
        ${chips}
      </div>
    </div>`;
  });
  document.getElementById('history-content').innerHTML = html;
}

async function deleteRecord(id) {
  if (!confirm('ลบรายการนี้?\n(ยอดค้างและการจ่ายที่เกี่ยวข้องจะถูกรีเซ็ตด้วย)')) return;
  setSyncStatus('syncing');
  try {
    await loadData();
    records = records.filter(r => r.id !== id);
    records = records.filter(r => !r.isPayment);
    paidRecords = [];
    await apiPost('reset', {});
    for (const r of records) await apiPost('saveRecord', r);
    setSyncStatus('ok');
    renderHistory(); renderSummary(); renderPaid();
    showToast('ลบรายการแล้ว');
  } catch(e) {
    showToast('ลบไม่สำเร็จ', true);
    setSyncStatus('error');
  }
}

function renderPaid() {
  if (!paidRecords.length) { document.getElementById('paid-content').innerHTML = '<div class="empty">ยังไม่มีรายการที่จ่ายแล้ว</div>'; return; }
  const sorted = [...paidRecords].sort((a,b) => new Date(b.date)-new Date(a.date));
  let html = '';
  sorted.forEach(r => {
    const ds = new Date(r.date+'T00:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
    html += `<div class="paid-item">
      <div><div style="font-weight:600">${r.from} → ${r.to}</div><div style="font-size:0.7rem;color:var(--text2);margin-top:2px">${ds}</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:700;color:var(--accent3)">฿${fmtAmt(parseFloat(r.amount))}</span>
        <span class="paid-badge">จ่ายแล้ว</span>
      </div>
    </div>`;
  });
  document.getElementById('paid-content').innerHTML = html;
}

async function resetAll() {
  if (!confirm('⚠️ ล้างข้อมูลทั้งหมด?\nรายการอาหารและยอดค้างทั้งหมดจะหายไป')) return;
  if (!confirm('ยืนยันอีกครั้ง — ล้างข้อมูลจริงๆ ใช่ไหม?')) return;
  setSyncStatus('syncing');
  try {
    records = []; paidRecords = [];
    await apiPost('reset', {});
    setSyncStatus('ok');
    showToast('รีเซ็ตเรียบร้อยแล้ว ✅');
    renderSummary(); renderHistory(); renderPaid();
  } catch(e) {
    showToast('รีเซ็ตไม่สำเร็จ', true);
    setSyncStatus('error');
  }
}

async function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.tab')[['add','summary','history','paid'].indexOf(tab)].classList.add('active');
  if (tab !== 'add') await loadData();
  if (tab === 'summary') renderSummary();
  else if (tab === 'history') renderHistory();
  else if (tab === 'paid') renderPaid();
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = isError ? 'var(--red)' : 'var(--accent3)'; t.style.color = isError ? '#fff' : '#111';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800);
}

loadData().then(() => { renderSummary(); renderHistory(); renderPaid(); });
</script>
</body>
</html>
